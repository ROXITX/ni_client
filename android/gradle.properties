org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Speed up Gradle builds locally
org.gradle.daemon=true
org.gradle.caching=true
org.gradle.parallel=true
# Disabled due to incompatibility with Flutter gradle plugin tasks
org.gradle.configuration-cache=false
# Enable file system watching for incremental builds
org.gradle.vfs.watch=true

# Kotlin incremental compilation
kotlin.incremental=true
kotlin.daemon.useFallbackStrategy=false
kotlin.code.style=official

android.nonTransitiveRClass=true
android.uniquePackageNames=true
android.defaults.buildfeatures.buildconfig=true
# Speed up resource processing
android.useParallelResourceProcessing=true
